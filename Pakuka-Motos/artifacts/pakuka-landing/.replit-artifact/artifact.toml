kind = "web"
previewPath = "/"
title = "Pakuka Motos - Landing Page"
version = "1.0.0"
id = "artifacts/pakuka-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24985

[services.development]
run = "pnpm --filter @workspace/pakuka-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pakuka-landing", "run", "build" ]
publicDir = "artifacts/pakuka-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24985"
BASE_PATH = "/"
